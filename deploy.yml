name: Deploy PWA su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari al deploy su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola esecuzione concorrente; non annullare i deploy in corso
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Pages
        uses: actions/configure-pages@v5

      - name: Carica artifact del sito (root, nessun build)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
